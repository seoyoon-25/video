{% extends "base.html" %}

{% block title %}페이지를 찾을 수 없음{% endblock %}

{% block content %}
<div class="min-h-[calc(100vh-200px)] flex items-center justify-center px-4">
    <div class="text-center">
        <div class="w-24 h-24 bg-dark-800 rounded-2xl flex items-center justify-center mx-auto mb-8">
            <svg class="w-12 h-12 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
        </div>
        <h1 class="text-6xl font-bold text-primary-500 mb-4">404</h1>
        <h2 class="text-2xl font-semibold text-white mb-4">페이지를 찾을 수 없습니다</h2>
        <p class="text-slate-400 mb-8 max-w-md mx-auto">
            요청하신 페이지가 존재하지 않거나 이동되었을 수 있습니다.
        </p>
        <div class="flex gap-4 justify-center">
            <a href="{{ url_for('main.index') }}"
               class="px-6 py-3 bg-primary-600 hover:bg-primary-500 text-white font-medium rounded-xl transition">
                홈으로 이동
            </a>
            <button onclick="history.back()"
                    class="px-6 py-3 bg-dark-700 hover:bg-dark-600 text-white font-medium rounded-xl transition">
                이전 페이지
            </button>
        </div>
    </div>
</div>
{% endblock %}
