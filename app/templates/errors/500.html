{% extends "base.html" %}

{% block title %}서버 오류{% endblock %}

{% block content %}
<div class="min-h-[calc(100vh-200px)] flex items-center justify-center px-4">
    <div class="text-center">
        <div class="w-24 h-24 bg-dark-800 rounded-2xl flex items-center justify-center mx-auto mb-8">
            <svg class="w-12 h-12 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
            </svg>
        </div>
        <h1 class="text-6xl font-bold text-red-500 mb-4">500</h1>
        <h2 class="text-2xl font-semibold text-white mb-4">서버 오류가 발생했습니다</h2>
        <p class="text-slate-400 mb-8 max-w-md mx-auto">
            일시적인 문제가 발생했습니다. 잠시 후 다시 시도해주세요.
        </p>
        <div class="flex gap-4 justify-center">
            <a href="{{ url_for('main.index') }}"
               class="px-6 py-3 bg-primary-600 hover:bg-primary-500 text-white font-medium rounded-xl transition">
                홈으로 이동
            </a>
            <button onclick="location.reload()"
                    class="px-6 py-3 bg-dark-700 hover:bg-dark-600 text-white font-medium rounded-xl transition">
                새로고침
            </button>
        </div>
    </div>
</div>
{% endblock %}
